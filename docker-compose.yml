# Production-style stack — no hot-reload, no source bind-mounts, no dev tooling.
# Use this when running NutriSnap on a single VPS or for production-like smoke tests.
#
# In Railway production: API is built from backend/Dockerfile directly and
# `alembic upgrade head` runs as a Pre-Deploy Command — this file is NOT used.
#
# For day-to-day local development use docker-compose.dev.yml instead
# (it adds hot-reload and a pgweb DB viewer on http://localhost:8081).
#
# Run:        docker compose up -d
# Logs:       docker compose logs -f api bot
# Stop:       docker compose down
# Reset DB:   docker compose down -v       (-v wipes named volumes)
#
# Migration flow:
#   postgres becomes healthy
#     ↓
#   `migrate` service runs `alembic upgrade head` and exits 0
#     ↓
#   `api` and `bot` start (gated on `service_completed_successfully`)

services:
  postgres:
    image: docker.io/library/postgres:16.4-alpine
    container_name: nutrisnap-postgres
    environment:
      POSTGRES_USER: nutrisnap
      POSTGRES_PASSWORD: nutrisnap
      POSTGRES_DB: nutrisnap
    # No host port exposure in prod — only reachable inside the compose network.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrisnap"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: docker.io/qdrant/qdrant:v1.12.4
    container_name: nutrisnap-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrisnap-migrate
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nutrisnap:nutrisnap@postgres:5432/nutrisnap
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    healthcheck:
      disable: true
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrisnap-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nutrisnap:nutrisnap@postgres:5432/nutrisnap
      QDRANT_URL: http://qdrant:6333
      # Set WEBHOOK_BASE_URL via .env to register the Telegram webhook on startup.
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck.py"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  bot:
    # Separate polling worker. Skip this service if you register the Telegram
    # webhook against `api` instead (set WEBHOOK_BASE_URL).
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrisnap-bot
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nutrisnap:nutrisnap@postgres:5432/nutrisnap
      QDRANT_URL: http://qdrant:6333
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    command: python -m app.bot.run_polling
    healthcheck:
      test: ["CMD", "python", "/app/scripts/healthcheck_bot.py"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
